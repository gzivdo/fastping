# Zabbix agent UserParameters for fastping.
# Drop into /etc/zabbix/zabbix_agent2.d/ (or zabbix_agentd.d/) and restart the agent.
# The agent process needs CAP_NET_RAW for the raw sockets:
#   setcap cap_net_raw+ep /usr/local/bin/fastping

# Master item: ping the whole list, return one JSON array for all hosts.
# Feed this to a master item + dependent items + LLD (see template.md, Model C).
UserParameter=fastping.sweep,/usr/local/bin/fastping -f /etc/fastping/hosts.txt -o json -C 3 --rate 50000

# Same list as an LLD source, if you prefer a dedicated discovery key.
UserParameter=fastping.discovery,/usr/local/bin/fastping -f /etc/fastping/hosts.txt -o json -C 1 -t 300

# Alternative (Model B): sweep and push per-host values over the native sender
# protocol to trapper items; the item value is just the sender's summary line.
UserParameter=fastping.push,/usr/local/bin/fastping -f /etc/fastping/hosts.txt -o zabbix --key icmp -C 3 --rate 50000 --server 127.0.0.1:10051 2>&1 | tail -1
